<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Noise Biome Generator</title>
		<style>
			body {
				font-family: system-ui, sans-serif;
				margin: 20px;
			}

			.controls,
			.maps {
				display: grid;
				gap: 12px;
			}

			.controls {
				grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
			}

			.maps {
				grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
				margin-top: 16px;
			}

			label {
				display: grid;
				gap: 6px;
			}

			.row {
				display: flex;
				gap: 8px;
				align-items: center;
			}

			canvas {
				width: 100%;
				image-rendering: pixelated;
				border: 1px solid #ccc;
			}

			.caption {
				font-size: 0.85rem;
				margin-top: 6px;
			}
		</style>
	</head>
	<body>
		<h1>Noise Biome Generator</h1>
		<div class="controls">
			<label>
				Noise scale <span class="value" id="scaleValue"></span>
				<input id="scale" type="range" min="10" max="1000" value="120" />
			</label>
			<label>
				Temperature bias <span class="value" id="tempValue"></span>
				<input id="tempBias" type="range" min="-0.4" max="0.4" step="0.02" value="0.0" />
			</label>
			<label>
				Moisture bias <span class="value" id="moistValue"></span>
				<input id="moistBias" type="range" min="-0.4" max="0.4" step="0.02" value="0.0" />
			</label>
			<label>
				Seed
				<div class="row">
					<input id="seed" type="number" value="1337" />
					<button id="randomSeed" type="button">Random</button>
				</div>
			</label>
			<div class="row">
				<button id="generate" type="button">Generate maps</button>
			</div>
		</div>

		<div class="maps">
			<div class="map-card">
				<canvas id="mapA" width="200" height="200"></canvas>
				<div class="caption" id="captionA"></div>
			</div>
			<div class="map-card">
				<canvas id="mapB" width="200" height="200"></canvas>
				<div class="caption" id="captionB"></div>
			</div>
			<div class="map-card">
				<canvas id="mapC" width="200" height="200"></canvas>
				<div class="caption" id="captionC"></div>
			</div>
		</div>

		<script>
			const scaleInput = document.getElementById("scale");
			const tempInput = document.getElementById("tempBias");
			const moistInput = document.getElementById("moistBias");
			const seedInput = document.getElementById("seed");
			const scaleValue = document.getElementById("scaleValue");
			const tempValue = document.getElementById("tempValue");
			const moistValue = document.getElementById("moistValue");

			const mapA = document.getElementById("mapA");
			const mapB = document.getElementById("mapB");
			const mapC = document.getElementById("mapC");
			const captionA = document.getElementById("captionA");
			const captionB = document.getElementById("captionB");
			const captionC = document.getElementById("captionC");

			const biomeColors = {
				ocean: [20, 58, 115],
				beach: [224, 206, 150],
				grassland: [111, 170, 98],
				forest: [40, 120, 75],
				rainforest: [22, 92, 66],
				desert: [219, 187, 117],
				savanna: [168, 180, 95],
				tundra: [140, 160, 165],
				taiga: [70, 120, 110],
				snow: [235, 245, 250],
				mountain: [120, 120, 130]
			};

			function updateLabels() {
				scaleValue.textContent = Number(scaleInput.value).toFixed(0);
				tempValue.textContent = Number(tempInput.value).toFixed(2);
				moistValue.textContent = Number(moistInput.value).toFixed(2);
			}

			function mulberry32(seed) {
				let t = seed >>> 0;
				return () => {
					t += 0x6d2b79f5;
					let r = Math.imul(t ^ (t >>> 15), t | 1);
					r ^= r + Math.imul(r ^ (r >>> 7), r | 61);
					return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
				};
			}

			function hash2D(x, y, seed) {
				let h = x * 374761393 + y * 668265263 + seed * 1442695041;
				h = (h ^ (h >>> 13)) * 1274126177;
				return ((h ^ (h >>> 16)) >>> 0) / 4294967296;
			}

			function lerp(a, b, t) {
				return a + (b - a) * t;
			}

			function fade(t) {
				return t * t * t * (t * (t * 6 - 15) + 10);
			}

			function valueNoise2D(x, y, seed) {
				const x0 = Math.floor(x);
				const y0 = Math.floor(y);
				const x1 = x0 + 1;
				const y1 = y0 + 1;
				const sx = fade(x - x0);
				const sy = fade(y - y0);

				const n00 = hash2D(x0, y0, seed);
				const n10 = hash2D(x1, y0, seed);
				const n01 = hash2D(x0, y1, seed);
				const n11 = hash2D(x1, y1, seed);

				const ix0 = lerp(n00, n10, sx);
				const ix1 = lerp(n01, n11, sx);
				return lerp(ix0, ix1, sy);
			}

			function basicNoise2D(x, y, seed) {
				return valueNoise2D(x, y, seed);
			}

			function clamp01(value) {
				return Math.min(1, Math.max(0, value));
			}

			function pickBiome(temp, moisture, elevation) {
				const waterLevel = 0.45;
				if (elevation < waterLevel) return "ocean";
				if (elevation < waterLevel + 0.03) return "beach";
				if (elevation > 0.82) return temp < 0.35 ? "snow" : "mountain";

				if (temp < 0.2) return "snow";
				if (temp < 0.35) return moisture > 0.5 ? "taiga" : "tundra";
				if (temp > 0.75) {
					if (moisture < 0.25) return "desert";
					if (moisture < 0.5) return "savanna";
					return "rainforest";
				}

				if (moisture < 0.3) return "grassland";
				if (moisture < 0.6) return "forest";
				return "rainforest";
			}

			function renderMap(canvas, params) {
				const ctx = canvas.getContext("2d");
				const { scale, tempBias, moistureBias, seed, tempOffset, moistOffset, elevOffset } = params;
				const size = canvas.width;
				const image = ctx.createImageData(size, size);

				for (let y = 0; y < size; y++) {
					for (let x = 0; x < size; x++) {
						const nx = x / scale;
						const ny = y / scale;

						const temperature = clamp01(
							basicNoise2D(nx + tempOffset, ny + tempOffset, seed + 17) + tempBias
						);
						const moisture = clamp01(
							basicNoise2D(nx + moistOffset, ny + moistOffset, seed + 29) + moistureBias
						);
						const elevation = basicNoise2D(nx + elevOffset, ny + elevOffset, seed + 43);

						const biome = pickBiome(temperature, moisture, elevation);
						const [r, g, b] = biomeColors[biome];
						const index = (y * size + x) * 4;
						image.data[index] = r;
						image.data[index + 1] = g;
						image.data[index + 2] = b;
						image.data[index + 3] = 255;
					}
				}

				ctx.putImageData(image, 0, 0);
			}

			function generateMaps() {
				updateLabels();

				const baseScale = Number(scaleInput.value);
				const baseTemp = Number(tempInput.value);
				const baseMoist = Number(moistInput.value);
				const seed = Number(seedInput.value) || 0;

				const rng = mulberry32(seed);
				const offsetsA = {
					tempOffset: rng() * 100,
					moistOffset: rng() * 100,
					elevOffset: rng() * 100
				};
				const offsetsB = {
					tempOffset: rng() * 100,
					moistOffset: rng() * 100,
					elevOffset: rng() * 100
				};
				const offsetsC = {
					tempOffset: rng() * 100,
					moistOffset: rng() * 100,
					elevOffset: rng() * 100
				};

				const baseParams = {
					scale: baseScale,
					tempBias: baseTemp,
					moistureBias: baseMoist,
					seed,
					...offsetsA
				};

				const variantB = {
					scale: baseScale,
					tempBias: baseTemp,
					moistureBias: baseMoist,
					seed,
					...offsetsB
				};

				const variantC = {
					scale: baseScale,
					tempBias: baseTemp,
					moistureBias: baseMoist,
					seed,
					...offsetsC
				};

				renderMap(mapA, baseParams);
				renderMap(mapB, variantB);
				renderMap(mapC, variantC);
			}

			document.getElementById("generate").addEventListener("click", generateMaps);
			document.getElementById("randomSeed").addEventListener("click", () => {
				seedInput.value = Math.floor(Math.random() * 100000);
				generateMaps();
			});

			[scaleInput, tempInput, moistInput, seedInput].forEach((input) => {
				input.addEventListener("input", () => {
					updateLabels();
				});
				input.addEventListener("change", generateMaps);
			});

			updateLabels();
		</script>
	</body>
</html>
